    <!-- ═══ JSON-LD: FAQPage ══════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Quién califica para los servicios de First Home Care Center?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Califican los beneficiarios de Medicare (Original) o Medicare Advantage que tengan un referido de su médico de cabecera y residan en nuestras áreas de servicio en Puerto Rico (42 municipios en las regiones Oeste, Sur y Norte)."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué servicios de salud en el hogar cubre Medicare en Puerto Rico?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Medicare y Medicare Advantage cubren: Enfermería Profesional, Terapia Física, Terapia Ocupacional, Terapia del Habla, Trabajo Médico Social, Consultoría de Nutrición y Asistencia de Salud en el Hogar. First Home Care Center factura directamente al plan médico, sin costo adicional para el paciente."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo puedo empezar a recibir servicios de salud en el hogar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El proceso tiene 3 pasos: (1) Habla con tu médico y pídele que te refiera a First Home Care Center, Inc. (2) Nuestro equipo te visitará en casa para realizar una evaluación de elegibilidad. (3) Una vez aprobado, nuestro equipo de salud comenzará a visitarte en tu hogar. Puedes contactarnos al 787-834-2295 para más información."
          }
        },
        {
          "@type": "Question",
          "name": "¿Tiene costo el servicio de salud en el hogar de First Home Care Center?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Para los beneficiarios de Medicare y Medicare Advantage que cumplan los requisitos, los servicios no tienen costo adicional. First Home Care Center factura directamente a su plan médico."
          }
        },
        {
          "@type": "Question",
          "name": "¿En qué municipios de Puerto Rico ofrece servicios First Home Care Center?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ofrecemos servicios en 42 municipios de Puerto Rico: Región Oeste (Aguada, Aguadilla, Añasco, Cabo Rojo, Hormigueros, Isabela, Lajas, Las Marías, Maricao, Mayagüez, Moca, Rincón, Sabana Grande, San Germán, San Sebastián), Región Sur (Adjuntas, Arroyo, Coamo, Guayama, Guayanilla, Guánica, Jayuya, Juana Díaz, Patillas, Ponce, Peñuelas, Salinas, Santa Isabel, Villalba, Yauco) y Región Norte (Arecibo, Barceloneta, Camuy, Ciales, Florida, Hatillo, Lares, Manatí, Morovis, Quebradillas, Utuado, Vega Baja)."
          }
        },
        {
          "@type": "Question",
          "name": "¿Está certificada First Home Care Center por Medicare?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. First Home Care Center, Inc. está certificada por el Departamento de Salud del Estado Libre Asociado de Puerto Rico y por el Seguro Social Federal (Medicare). Somos una organización sin fines de lucro fundada en 1984."
          }
        }
      ]
    }
